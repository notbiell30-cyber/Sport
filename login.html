<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Entrar — SportZone</title>
  <meta name="description" content="Acesse sua conta SportZone para acompanhar pedidos e aproveitar ofertas exclusivas."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="login-page">
  
  <div class="login-form-side">
    <a href="index.html" class="logo">
      <span class="logo-mark">S</span>
      <span class="logo-text">SPORT<span>ZONE</span></span>
    </a>

    <div class="login-form">
      <h1 id="title">Bem-vindo de volta</h1>
      <p id="subtitle">Entre para continuar suas compras.</p>

      <form class="form">
        <div class="field hidden" id="name-field">
          <label for="name">Nome completo</label>
          <input class="input" id="name" placeholder="Seu nome"/>
        </div>
        
        <div class="field">
          <label for="email">Usuário ou E-mail</label>
          <div class="input-wrap">
            <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input class="input with-icon" id="email" type="text" placeholder="Seu usuário ou e-mail" required autocomplete="off"/>
          </div>
        </div>
        
        <div class="field">
          <div class="field-row">
            <label for="password">Senha</label>
            <a href="#" class="link">Esqueceu?</a>
          </div>
          <div class="input-wrap">
            <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input class="input with-icon with-icon-r" id="password" type="password" placeholder="••••••••" required/>
            <button type="button" id="toggle-pw" aria-label="Mostrar senha">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-lg btn-primary btn-block">Entrar →</button>

        <div class="divider"><span>ou continue com</span></div>

        <div class="social">
          <button type="button" class="btn btn-outline">Google</button>
          <button type="button" class="btn btn-outline">Apple</button>
        </div>

        <p class="toggle-text">
          <span id="alt-text">Não tem conta? </span>
          <button type="button" id="mode-toggle">Criar agora</button>
        </p>
      </form>
    </div>

    <p class="legal">Ao continuar, você concorda com nossos Termos e Política de Privacidade.</p>
  </div>

  <div class="login-visual">
    <div class="login-visual-inner">
      <span class="pill"><span class="dot"></span>Coleção 2026</span>
      <img src="assets/hero-cleat.jpg" alt="Chuteira em destaque"/>
      <div>
        <h2>"Equipamento certo.<br/>Performance no limite."</h2>
        <p class="sub">Mais de 50 mil atletas confiam na SportZone.</p>
      </div>
    </div>
  </div>
  
</div>

<script src="app.js"></script>
</body>
</html>
